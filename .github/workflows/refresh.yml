name: refresh-proxy-list

# Lightweight re-validation: re-tests only proxies already in proxies/json/ (no
# scraping), so it runs ~5x faster than the daily update. Keeps the list fresher
# than once-a-day given free proxies live for minutes-to-hours.

on:
  workflow_dispatch:
  schedule:
    # Every 6 hours at off-round minutes to spread API load (not :00/:30).
    - cron: "23 */6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # Separate group from update-proxy-list so the two never cancel each other.
  group: refresh-proxy-list
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Single job: build → commit → deploy, all on the same runner + working tree.
    # A separate deploy-pages job used to re-checkout@v4, which fetches the SHA the
    # run was *triggered* on — not the fresh commit `build` just pushed — so Pages
    # always lagged one run behind. Keeping deploy inline means we upload the exact
    # docs/ we just generated and committed.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Refresh proxies (re-validate existing set only)
        env:
          PROXY_TIMEOUT_SEC: "8"
          PROXY_CONCURRENCY: "200"
        run: python scripts/update.py --refresh

      - name: Commit changes (if any)
        id: commit
        run: |
          if git diff --quiet; then
            echo "No changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: 6h proxy refresh (re-validate existing)"
          # This workflow races the daily update workflow (both commit auto-generated
          # files). -X theirs keeps our version on content conflicts (files are fully
          # rewritten each run). Retry + force-with-lease fallback so neither workflow
          # hard-blocks the other.
          for i in 1 2 3; do
            if git pull --rebase --autostash -X theirs origin main; then
              git push && break
            fi
            echo "Rebase attempt $i failed; aborting and retrying..."
            git rebase --abort 2>/dev/null || true
            sleep 5
            if [ "$i" -eq 3 ]; then
              echo "Rebase exhausted retries; force-with-lease pushing our version."
              git push --force-with-lease
            fi
          done
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Deploy from THIS working tree (the one we just generated and committed),
      # not a fresh checkout that would resolve to the run-trigger SHA and lag a
      # cycle behind. Runs unconditionally so a no-op refresh still redeploys the
      # current docs/ (which already matches origin/main).
      - name: Setup Pages
        if: always()
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4
